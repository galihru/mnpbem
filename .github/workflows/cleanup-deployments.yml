name: Cleanup Deployments
# Keeps the newest successful deployment per environment; if none exists, keeps the newest entry.

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */2 * * *"
  workflow_run:
    workflows:
      - Publish mnpbem
      - Publish mnpbem-base
      - Publish mnpbem-bem
      - Publish mnpbem-demo
      - Publish mnpbem-demo-mnpbem
      - Publish mnpbem-greenfun
      - Publish mnpbem-help
      - Publish mnpbem-material
      - Publish mnpbem-mesh2d
      - Publish mnpbem-mex
      - Publish mnpbem-mie
      - Publish mnpbem-misc
      - Publish mnpbem-particles
      - Publish mnpbem-simulation
    types:
      - completed
  push:
    branches:
      - main
    paths:
      - ".github/workflows/cleanup-deployments.yml"

permissions:
  contents: read
  deployments: write

jobs:
  cleanup:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion != 'cancelled'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment:
          - mnpbem
          - mnpbem-base
          - mnpbem-bem
          - mnpbem-demo
          - mnpbem-demo-mnpbem
          - mnpbem-greenfun
          - mnpbem-help
          - mnpbem-material
          - mnpbem-mesh2d
          - mnpbem-mex
          - mnpbem-mie
          - mnpbem-misc
          - mnpbem-particles
          - mnpbem-simulation
    steps:
      - name: Cleanup failed and stale deployments
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const environment = "${{ matrix.environment }}";

            const deployments = await github.paginate(
              github.rest.repos.listDeployments,
              { owner, repo, environment, per_page: 100 }
            );

            core.info(`[${environment}] Found ${deployments.length} deployment(s).`);
            if (deployments.length === 0) {
              return;
            }

            const deploymentStates = [];
            for (const dep of deployments) {
              const statuses = await github.rest.repos.listDeploymentStatuses({
                owner,
                repo,
                deployment_id: dep.id,
                per_page: 1,
              });
              const latestState =
                statuses.data.length > 0 ? statuses.data[0].state : "unknown";
              deploymentStates.push({ dep, latestState });
            }

            const newestSuccessful = deploymentStates.find((item) => item.latestState === "success");
            const keepDeploymentId = newestSuccessful
              ? newestSuccessful.dep.id
              : deploymentStates[0].dep.id;

            for (const { dep, latestState } of deploymentStates) {
              if (dep.id === keepDeploymentId) {
                core.info(`[${environment}] Keeping deployment ${dep.id} (state=${latestState}).`);
                continue;
              }

              core.info(`[${environment}] Deleting deployment ${dep.id} (state=${latestState}).`);

              try {
                await github.rest.repos.createDeploymentStatus({
                  owner,
                  repo,
                  deployment_id: dep.id,
                  state: "inactive",
                  auto_inactive: true,
                });
              } catch (err) {
                core.warning(`[${environment}] Could not mark deployment ${dep.id} inactive: ${err.message}`);
              }

              await github.rest.repos.deleteDeployment({
                owner,
                repo,
                deployment_id: dep.id,
              });
            }
