name: Sync Deployment Links

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/sync-deployment-links.yml"

permissions:
  contents: read
  deployments: write

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment:
          - mnpbem
          - mnpbem-base
          - mnpbem-bem
          - mnpbem-demo
          - mnpbem-demo-mnpbem
          - mnpbem-greenfun
          - mnpbem-help
          - mnpbem-material
          - mnpbem-mesh2d
          - mnpbem-mex
          - mnpbem-mie
          - mnpbem-misc
          - mnpbem-particles
          - mnpbem-simulation
    steps:
      - name: Create linked deployment entry
        uses: actions/github-script@v8
        env:
          DEPLOY_ENVIRONMENT: ${{ matrix.environment }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const environment = process.env.DEPLOY_ENVIRONMENT;
            const environmentUrl = `https://pypi.org/project/${environment}/`;

            let description = `Deployment URL synchronized for ${environment}.`;
            try {
              const response = await fetch(`https://pypi.org/pypi/${environment}/json`);
              if (response.ok) {
                description = `PyPI package available: ${environment}.`;
              } else {
                description = `PyPI package not yet available: ${environment}.`;
              }
            } catch (error) {
              description = `PyPI check skipped for ${environment}: ${error.message}`;
            }

            const deployment = await github.rest.repos.createDeployment({
              owner,
              repo,
              ref: context.sha,
              environment,
              auto_merge: false,
              required_contexts: [],
              transient_environment: true,
              description: `Sync deployment link for ${environment}`,
            });

            await github.rest.repos.createDeploymentStatus({
              owner,
              repo,
              deployment_id: deployment.data.id,
              state: "success",
              environment_url: environmentUrl,
              description,
            });
