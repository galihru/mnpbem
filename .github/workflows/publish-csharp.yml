name: Publish CSharp Package

on:
  release:
    types: [published]
  workflow_dispatch:
  push:
    tags:
      - 'csharp-v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      HAS_NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            6.0.x

      - name: Add nuget.org source
        run: dotnet nuget add source https://api.nuget.org/v3/index.json --name nuget.org || true

      - name: Restore
        run: |
          dotnet restore csharp-mnp-plasmon/MnpPlasmon/MnpPlasmon.csproj
          dotnet restore csharp-mnp-plasmon/MnpPlasmon.Tests/MnpPlasmon.Tests.csproj

      - name: Build
        run: dotnet build csharp-mnp-plasmon/MnpPlasmon/MnpPlasmon.csproj -c Release --no-restore

      - name: Test
        run: dotnet test csharp-mnp-plasmon/MnpPlasmon.Tests/MnpPlasmon.Tests.csproj -c Release --no-restore

      - name: Pack
        run: dotnet pack csharp-mnp-plasmon/MnpPlasmon/MnpPlasmon.csproj -c Release --no-build -o artifacts

      - name: Publish to NuGet.org
        if: ${{ env.HAS_NUGET_API_KEY != '' }}
        run: dotnet nuget push artifacts/*.nupkg --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: dotnet nuget push artifacts/*.nupkg --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key "${{ secrets.GITHUB_TOKEN }}" --skip-duplicate
