name: Bug report
description: Report a reproducible bug
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out this form to help us reproduce and fix it quickly.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is the problem?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List exact steps and inputs.
      placeholder: |
        1. Run command ...
        2. Call function ...
        3. Observe error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package/module version
      placeholder: 0.1.4
  - type: dropdown
    id: language
    attributes:
      label: Language module
      options:
        - JavaScript
        - Python
        - C#
        - Rust
        - Ruby
        - Julia
        - R
        - C
        - C++
        - Other
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, runtime/compiler version, and architecture.
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      render: shell