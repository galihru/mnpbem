name: Publish Rust Package to Crates.io

on:
  push:
    tags:
      - 'rust-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Cargo version bump (major, minor, patch)'
        required: false
        default: 'patch'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Verify project structure
        run: |
          cd rust-mnp-plasmon
          ls -la

      - name: Run tests
        run: |
          cd rust-mnp-plasmon
          cargo test

      - name: Build release
        run: |
          cd rust-mnp-plasmon
          cargo build --release

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
        run: |
          cd rust-mnp-plasmon
          cargo publish --allow-dirty

      - name: Publish to GitHub Container Registry
        run: |
          cd rust-mnp-plasmon
          cargo publish --dry-run

      - name: Create release notes
        if: startsWith(github.ref, 'refs/tags/rust-v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/rust-v}
          echo "## Rust Package (mnp-plasmon) v${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 Published to:" >> $GITHUB_STEP_SUMMARY
          echo "- crates.io: https://crates.io/crates/mnp-plasmon/versions" >> $GITHUB_STEP_SUMMARY
          echo "- docs.rs: https://docs.rs/mnp-plasmon/latest/mnp_plasmon/" >> $GITHUB_STEP_SUMMARY
