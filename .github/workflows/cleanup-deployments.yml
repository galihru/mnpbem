name: Cleanup Deployments

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/cleanup-deployments.yml"

permissions:
  contents: read
  deployments: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment:
          - mnpbem
          - mnpbem-base
          - mnpbem-bem
          - mnpbem-demo
          - mnpbem-demo-mnpbem
          - mnpbem-greenfun
          - mnpbem-help
          - mnpbem-material
          - mnpbem-mesh2d
          - mnpbem-mex
          - mnpbem-mie
          - mnpbem-misc
          - mnpbem-particles
          - mnpbem-simulation
    steps:
      - name: Cleanup failed and stale deployments
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const environment = "${{ matrix.environment }}";

            const deployments = await github.paginate(
              github.rest.repos.listDeployments,
              { owner, repo, environment, per_page: 100 }
            );

            core.info(`[${environment}] Found ${deployments.length} deployment(s).`);
            if (deployments.length === 0) {
              return;
            }

            let keptSuccessful = false;
            for (const dep of deployments) {
              const statuses = await github.paginate(
                github.rest.repos.listDeploymentStatuses,
                { owner, repo, deployment_id: dep.id, per_page: 1 }
              );
              const latestState = statuses.length > 0 ? statuses[0].state : "unknown";

              const isSuccess = latestState === "success";
              const shouldKeep = isSuccess && !keptSuccessful;

              if (shouldKeep) {
                keptSuccessful = true;
                core.info(`[${environment}] Keeping deployment ${dep.id} (state=${latestState}).`);
                continue;
              }

              core.info(`[${environment}] Deleting deployment ${dep.id} (state=${latestState}).`);

              try {
                await github.rest.repos.createDeploymentStatus({
                  owner,
                  repo,
                  deployment_id: dep.id,
                  state: "inactive",
                  auto_inactive: true,
                });
              } catch (err) {
                core.warning(`[${environment}] Could not mark deployment ${dep.id} inactive: ${err.message}`);
              }

              await github.rest.repos.deleteDeployment({
                owner,
                repo,
                deployment_id: dep.id,
              });
            }
