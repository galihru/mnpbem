name: Publish npm packages

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version increment type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
  push:
    branches:
      - main
    paths:
      - "npm-packages/**"

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"

      # -- 1. Publish to npmjs.com ------------------------------------------
      - name: Publish all to npmjs.com
        working-directory: npm-packages
        env:
          NPMJS_TOKEN: ${{ secrets.NPMJS_API_TOKEN }}
        run: |
          printf '//registry.npmjs.org/:_authToken=%s\n' "$NPMJS_TOKEN" > .npmrc
          for pkg in packages/mnp-material packages/mnp-mie packages/mnp; do
            (cd "$pkg" && npm publish --registry https://registry.npmjs.org/ --access public) || true
          done

      # -- 2. Publish to GitHub Package Registry ----------------------------
      - name: Publish all to GitHub Packages
        working-directory: npm-packages
        env:
          GH_PKG_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '//npm.pkg.github.com/:_authToken=%s\n' "$GH_PKG_TOKEN" > .npmrc
          for pkg in packages/mnp-material packages/mnp-mie packages/mnp; do
            (cd "$pkg" && npm publish --registry https://npm.pkg.github.com/ --access public)
          done

      # -- 3. Clean up .npmrc -----------------------------------------------
      - name: Remove .npmrc token
        if: always()
        run: echo "# registry placeholders" > npm-packages/.npmrc