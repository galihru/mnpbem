name: Julia — Test & Register

on:
  push:
    paths:
      - 'julia-mnp-plasmon/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.10'

      - name: Install dependencies
        run: julia --project=julia-mnp-plasmon -e 'using Pkg; Pkg.instantiate()'

      - name: Run tests
        run: julia --project=julia-mnp-plasmon julia-mnp-plasmon/test/runtests.jl

  # Julia General Registry registration is triggered by commenting
  # "@JuliaRegistrator register" on the commit. No token required —
  # the JuliaRegistrator GitHub App handles the PR automatically.
  register-hint:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Registration instructions
        run: |
          echo "Tests passed."
          echo ""
          echo "To register MnpPlasmon.jl in the Julia General Registry:"
          echo "  1. Open the latest commit on GitHub."
          echo "  2. Leave a comment: @JuliaRegistrator register"
          echo "  3. The bot opens a PR to JuliaRegistries/General automatically."
          echo "  4. After ~3 days the PR is auto-merged if CI passes."
